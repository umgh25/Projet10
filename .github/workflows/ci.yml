name: CI Build, Test & Deploy Docker Images

on: [push]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and test backend
        run: ./mvnw clean install
        working-directory: ./back

      - name: Test Report (JUnit)
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: 'JUnit Tests (Backend)'
          path: back/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          only-summary: 'false'

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: back/target/site/jacoco/

      - name: Analyse SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=umgh25_projet10-backend -Dsonar.organization=umgh25 -Dsonar.host.url=https://sonarcloud.io
        working-directory: ./back
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: ./front

      - name: Install Chrome
        run: |
          if ! command -v google-chrome; then
            sudo apt-get update
            sudo apt-get install -y wget
            wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
            sudo apt install -y ./google-chrome-stable_current_amd64.deb
          fi

      - name: Build Frontend
        run: npm run build
        working-directory: ./front

      - name: Run tests with coverage
        run: npm run test -- --code-coverage --watch=false
        working-directory: ./front

      - name: Test Report (Karma/JUnit)
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: 'Karma Tests (Frontend)'
          path: front/coverage/junit.xml
          reporter: java-junit

      - name: Upload Frontend Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: front/coverage/bobapp/

      - name: Install SonarScanner CLI
        run: npm install -g sonarqube-scanner

      - name: Analyse SonarCloud Frontend
        run: sonar-scanner -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: ./front

  dockerhub:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/bobapp-backend:latest

      - name: Build & Push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/bobapp-frontend:latest